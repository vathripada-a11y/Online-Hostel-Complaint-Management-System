<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hostel Complaint System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="navbar">
  <span class="brand">Hostel Complaint Management System</span>
</div>

<div style="min-height:90vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="text-align:center;width:100%;max-width:640px;">

    <h2 style="font-size:22px;font-weight:500;color:#1a3a5c;margin-bottom:8px;">
      Welcome! Who are you?
    </h2>
    <p style="font-size:14px;color:#718096;margin-bottom:36px;">
      Select your role to continue to login
    </p>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">

      <div class="card" onclick="window.location.href='studentlogin.html'"
        style="cursor:pointer;padding:32px 16px;">
        <div style="font-size:48px;margin-bottom:12px;">🎓</div>
        <h3 style="font-size:16px;color:#1a3a5c;margin-bottom:6px;">Student</h3>
        <p style="font-size:13px;color:#718096;margin:0;">Submit and track your complaints</p>
      </div>

      <div class="card" onclick="window.location.href='warden_login.html'"
        style="cursor:pointer;padding:32px 16px;">
        <div style="font-size:48px;margin-bottom:12px;">🛡️</div>
        <h3 style="font-size:16px;color:#1a3a5c;margin-bottom:6px;">Warden</h3>
        <p style="font-size:13px;color:#718096;margin:0;">Manage and resolve complaints</p>
      </div>

      <div class="card" onclick="window.location.href='admin_login.html'"
        style="cursor:pointer;padding:32px 16px;">
        <div style="font-size:48px;margin-bottom:12px;">📊</div>
        <h3 style="font-size:16px;color:#1a3a5c;margin-bottom:6px;">Admin</h3>
        <p style="font-size:13px;color:#718096;margin:0;">Monitor system statistics</p>
      </div>

    </div>
  </div>
</div>

</body>
</html>
