<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Warden Login</title>
 <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <h2>Hostel Complaint System</h2>
    <p class="subtitle">Warden Login</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="btn-primary" onclick="wardenLogin()">Login</button>
  </div>
</div>

<script>
async function wardenLogin() {
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value

  const res = await fetch('http://localhost:3000/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if (data.success && data.role === 'warden') {
    window.location.href = '/warden_dashboard.html'
  } else if (data.success && data.role !== 'warden') {
    alert('Access denied! This login is for wardens only.')
  } else {
    alert(data.message)
  }
}
</script>

</body>
</html>
